<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collège Emmanuel - Chargement</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary-color: #3b82f6;
            --secondary-color: #60a5fa;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(96, 165, 250, 0.08) 0%, transparent 40%);
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            border-radius: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        /* Effet de brillance qui passe sur le conteneur */
        .splash-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 45%,
                rgba(255, 255, 255, 0.05) 50%,
                transparent 55%
            );
            transform: rotate(45deg);
            animation: shine 4s infinite;
            pointer-events: none;
        }

        .splash-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        .logo-img {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
            display: block;
        }

        .school-name {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            line-height: 1.2;
        }

        .loader-wrapper {
            width: 100%;
            position: relative;
            margin-top: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2.5px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2.5px;
            animation: loading 2s infinite ease-in-out;
            box-shadow: 0 0 8px var(--primary-color);
        }

        .status-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 1rem;
            height: 1.2em;
        }

        .dots {
            display: inline-block;
            width: 16px;
            text-align: left;
            animation: dots-animation 1.5s steps(4, end) infinite;
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; }
            50% { width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.9; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        @keyframes dots-animation {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        /* Responsive pour différentes tailles */
        @media (max-width: 500px) {
            .splash-container {
                padding: 1.5rem;
            }

            .logo-img {
                width: 70px;
            }

            .school-name {
                font-size: 1.1rem;
            }

            .status-text {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="splash-content">
            <div class="logo-wrapper">
                <!-- Logo avec fallback en cas d'indisponibilité -->
                <img 
                    src="logo.png"
                    alt="Logo Collège Emmanuel" 
                    class="logo-img"
                    onerror="this.style.display='none'"
                >
            </div>
            <h1 class="school-name">Collège Emmanuel</h1>
            <div class="loader-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
            <div class="status-text">
                Connexion sécurisée<span class="dots">...</span>
            </div>
        </div>
    </div>

    <script>
        // Animation des points de suspension
        const dots = document.querySelector('.dots');
        let count = 0;
        
        setInterval(() => {
            count = (count + 1) % 4;
            dots.textContent = '.'.repeat(count);
        }, 400);

        // Log pour debug Electron
        console.log('🎬 Splash Screen chargé avec succès');
    </script>
</body>
</html>
