<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode hors ligne</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:420px;
            max-width:90%;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.15);
        }

        .icon{
            font-size:70px;
            margin-bottom:20px;
        }

        h1{
            color:#dc2626;
            margin-bottom:15px;
        }

        p{
            color:#555;
            line-height:1.6;
            margin-bottom:25px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        small{
            display:block;
            margin-top:20px;
            color:#888;
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="icon">📡</div>

        <h1>Connexion Internet indisponible</h1>

        <p>
            Impossible de charger l'application.
            Vérifiez votre connexion Internet puis réessayez.
        </p>

        <button onclick="window.location.reload()">
            Réessayer
        </button>

        <small>
            Collège Emmanuel • Application Desktop
        </small>

    </div>

</body>

</html>
